<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
For Nikita ❤️
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&family=Great+Vibes&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="stars"></div>

<div class="container">

<header>

<div class="logo">

❤️ Made with love

</div>

<button id="musicBtn">

🎵

</button>

</header>

<section class="hero">

<div class="hero-left">

<p class="tag">

A LETTER I SHOULD HAVE WRITTEN SOONER

</p>

<h1>

Some words

<span>

were never said

</span>

properly.

</h1>

<p class="description">

This isn't just a website.

<br><br>

It's a place where

I've kept everything

I couldn't say to you.

</p>

<button class="hero-btn">

❤️ Open My Heart

</button>

</div>

<div class="hero-right">

<div class="envelope" id="envelope">

<div class="envelope-back"></div>

<div class="letter">

<div class="paper">

<p class="paperTitle">

For Nikita ❤️

</p>

<p class="paperText">

Some feelings
deserved
more than
a text.

</p>

</div>

</div>

<div class="envelope-front"></div>

<div class="envelope-top"></div>

<div class="seal">

❤️

</div>

</div>

<p class="clickText">

Click the envelope

to open the letter ❤️

</p>

</div>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
